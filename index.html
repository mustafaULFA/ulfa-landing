<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULFA — One Purpose. Together.</title>
<script>document.documentElement.classList.add('js');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --navy:#0E1B2E;
    --navy-deep:#070D17;
    --navy-mid:#13243B;
    --gold:#C5973A;
    --gold-warm:#D4AB5C;
    --gold-pale:#EDD89A;
    --cream:#F8F4EE;
    --ink-muted:#8A99AC;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--navy-deep);
    color:var(--cream);
    font-family:'Jost',system-ui,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ── STAGE ───────────────────────────────── */
  .stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    isolation:isolate;
  }

  /* base navy field + slow ambient gold glow */
  .field{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(120% 120% at 50% 38%, #16294291 0%, var(--navy) 38%, var(--navy-deep) 100%);
  }
  .ambient{
    position:fixed;
    inset:-25%;
    z-index:0;
    background:
      radial-gradient(38% 42% at 30% 32%, rgba(197,151,58,0.10), transparent 70%),
      radial-gradient(34% 38% at 72% 70%, rgba(212,171,92,0.07), transparent 70%);
    filter:blur(8px);
    animation:drift 26s ease-in-out infinite alternate;
    will-change:transform;
  }
  @keyframes drift{
    0%  {transform:translate3d(-3%,-2%,0) scale(1);}
    50% {transform:translate3d(2%,3%,0)   scale(1.08);}
    100%{transform:translate3d(3%,-3%,0)  scale(1.02);}
  }

  /* mouse streak canvas */
  #streak{
    position:fixed;
    inset:0;
    z-index:1;
    pointer-events:none;
  }

  /* faint grain/vignette to ground the gallery feel */
  .vignette{
    position:fixed;
    inset:0;
    z-index:2;
    pointer-events:none;
    background:radial-gradient(130% 130% at 50% 50%, transparent 56%, rgba(4,8,15,0.55) 100%);
  }

  /* ── GALLERY FRAME ───────────────────────── */
  .frame{
    position:fixed;
    inset:clamp(16px,2.4vw,34px);
    z-index:3;
    pointer-events:none;
    border:1px solid rgba(197,151,58,0.14);
  }
  .corner{
    position:absolute;
    width:clamp(26px,3vw,40px);
    height:clamp(26px,3vw,40px);
    stroke:var(--gold);
    fill:none;
    stroke-width:1.4;
    opacity:.85;
    stroke-dasharray:120;
    stroke-dashoffset:0;
  }
  .corner.tl{top:-1px;left:-1px;}
  .corner.tr{top:-1px;right:-1px;transform:scaleX(-1);}
  .corner.bl{bottom:-1px;left:-1px;transform:scaleY(-1);}
  .corner.br{bottom:-1px;right:-1px;transform:scale(-1,-1);}

  /* vertical placard caption (japanese gallery touch) */
  .placard{
    position:fixed;
    z-index:4;
    left:clamp(20px,2.8vw,42px);
    top:50%;
    transform:translateY(-50%) rotate(180deg);
    writing-mode:vertical-rl;
    font-size:10px;
    letter-spacing:.42em;
    text-transform:uppercase;
    color:rgba(212,171,92,0.5);
    font-weight:400;
    pointer-events:none;
    opacity:1;
  }
  @media (max-width:760px){ .placard{display:none;} }

  /* ── CONTENT ─────────────────────────────── */
  .content{
    position:relative;
    z-index:4;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:0 24px;
    max-width:680px;
  }
  /* Entrance: visible by default; motion enhances under no-preference (never traps content hidden) */
  .reveal{opacity:1;}
  @keyframes rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
  @keyframes drawCorner{from{opacity:0;stroke-dashoffset:120;}to{opacity:.85;stroke-dashoffset:0;}}
  @keyframes fadeSoft{from{opacity:0;}to{opacity:1;}}
  /* Animate only when JS present AND motion allowed; base stays visible otherwise */
  @media (prefers-reduced-motion: no-preference){
    .js .reveal{opacity:0;transform:translateY(20px);animation:rise 1.15s cubic-bezier(.22,1,.36,1) forwards;}
    .js .eyebrow{animation-delay:.15s;}
    .js .mark-wrap{animation-delay:.30s;}
    .js .wordmark{animation-delay:.44s;}
    .js .slogan{animation-delay:.58s;}
    .js .subline{animation-delay:.74s;}
    .js .capture{animation-delay:.90s;}
    .js .corner{opacity:0;animation:drawCorner 1.5s cubic-bezier(.22,1,.36,1) 1s forwards;}
    .js .placard{opacity:0;animation:fadeSoft 1.3s ease 1.2s forwards;}
  }
  /* Safety net: force-reveal if the animation timeline ever stalls */
  .shown .reveal{opacity:1!important;transform:none!important;animation:none!important;}
  .shown .corner{opacity:.85!important;stroke-dashoffset:0!important;animation:none!important;}
  .shown .placard{opacity:1!important;animation:none!important;}

  .eyebrow{
    font-size:clamp(9px,1.1vw,10.5px);
    font-weight:500;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:clamp(26px,4vh,42px);
  }

  .mark-wrap{
    margin-bottom:clamp(20px,3.2vh,30px);
    line-height:0;
  }
  .mark{
    width:clamp(74px,9vw,104px);
    height:auto;
    filter:drop-shadow(0 0 18px rgba(197,151,58,0.28));
  }
  @media (prefers-reduced-motion: no-preference){
    .mark{animation:floaty 7s ease-in-out 1.6s infinite;}
  }
  @keyframes floaty{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-7px);}
  }

  .wordmark{
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:clamp(16px,2vw,19px);
    font-weight:500;
    letter-spacing:.62em;
    text-indent:.62em;
    color:var(--gold-warm);
    margin-bottom:clamp(22px,3.4vh,34px);
  }

  .slogan{
    font-family:'Cormorant Garamond',Georgia,serif;
    font-size:clamp(38px,6.6vw,76px);
    font-weight:400;
    line-height:1.04;
    letter-spacing:.005em;
    color:var(--cream);
  }
  .slogan .line{display:block;white-space:nowrap;}
  .slogan .dot{color:var(--gold);}

  .subline{
    font-size:clamp(12.5px,1.5vw,15px);
    font-weight:300;
    line-height:1.7;
    color:var(--ink-muted);
    max-width:30em;
    margin-top:clamp(20px,3vh,28px);
  }

  /* ── EMAIL CAPTURE ───────────────────────── */
  .capture{
    margin-top:clamp(34px,5vh,52px);
    width:min(460px,86vw);
  }
  .bar{
    display:flex;
    align-items:stretch;
    border:1px solid rgba(197,151,58,0.34);
    background:rgba(8,15,26,0.45);
    backdrop-filter:blur(4px);
    transition:border-color .4s ease, box-shadow .4s ease;
  }
  .bar:focus-within{
    border-color:var(--gold);
    box-shadow:0 0 0 1px rgba(197,151,58,0.3), 0 0 32px rgba(197,151,58,0.16);
  }
  .bar input{
    flex:1;
    min-width:0;
    background:transparent;
    border:none;
    outline:none;
    color:var(--cream);
    font-family:'Jost',sans-serif;
    font-size:14px;
    font-weight:300;
    letter-spacing:.02em;
    padding:0 18px;
  }
  .bar input::placeholder{color:rgba(138,153,172,0.7);font-weight:300;}
  .bar button{
    flex-shrink:0;
    background:var(--gold);
    color:var(--navy);
    font-family:'Jost',sans-serif;
    font-size:11px;
    font-weight:500;
    letter-spacing:.2em;
    text-transform:uppercase;
    border:none;
    cursor:pointer;
    padding:15px 26px;
    position:relative;
    overflow:hidden;
    transition:background .35s ease, color .35s ease;
  }
  .bar button:hover{background:var(--gold-pale);}
  .bar button:active{transform:translateY(0.5px);}
  .bar button span{position:relative;z-index:1;}

  .note{
    margin-top:14px;
    font-size:11px;
    font-weight:300;
    letter-spacing:.06em;
    color:rgba(138,153,172,0.78);
    min-height:1.2em;
    transition:color .4s ease;
  }
  .note.error{color:#D98C6A;}
  .note.success{color:var(--gold-warm);}

  /* success swap */
  .capture.done .bar{
    border-color:rgba(197,151,58,0.34);
    pointer-events:none;
  }

  @media (prefers-reduced-motion: reduce){
    .ambient,.mark{animation:none;}
    .reveal{transition:opacity .5s ease;transform:none;}
  }

</style>
</head>

/* ════════ BUTTERY GOLD STREAK TRAIL ════════ */
(function(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const canvas = document.getElementById('streak');
  const ctx = canvas.getContext('2d');
  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  resize();
  window.addEventListener('resize', resize);

  const LIFE = 620;            // ms a point stays alive
  const pts = [];              // {x,y,t}
  let last = null;

  function addPoint(x,y){
    const now = performance.now();
    if(last){
      // interpolate on fast moves so the trail stays continuous & buttery
      const dx = x-last.x, dy = y-last.y;
      const dist = Math.hypot(dx,dy);
      const step = 9;
      if(dist > step){
        const n = Math.min(Math.floor(dist/step), 18);
        for(let i=1;i<=n;i++){
          pts.push({x:last.x+dx*(i/n), y:last.y+dy*(i/n), t:now});
        }
      }
    }
    pts.push({x,y,t:now});
    last = {x,y};
  }

  if(!reduce){
    window.addEventListener('pointermove', e=>addPoint(e.clientX,e.clientY), {passive:true});
    window.addEventListener('touchmove', e=>{
      const t = e.touches[0]; if(t) addPoint(t.clientX,t.clientY);
    }, {passive:true});
  }

  function lerp(a,b,k){return a+(b-a)*k;}

  function frame(){
    const now = performance.now();
    ctx.clearRect(0,0,W,H);

    while(pts.length && now - pts[0].t > LIFE) pts.shift();

    if(pts.length > 1){
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // soft glow pass
      ctx.shadowColor = 'rgba(212,171,92,0.85)';
      for(let i=1;i<pts.length;i++){
        const p0 = pts[i-1], p1 = pts[i];
        const k = 1 - (now - p1.t)/LIFE;
        if(k <= 0) continue;
        const ease = k*k;
        ctx.shadowBlur = 22*ease;
        ctx.strokeStyle = 'rgba(197,151,58,'+(ease*0.5)+')';
        ctx.lineWidth = 9*ease;
        ctx.beginPath();
        ctx.moveTo(p0.x,p0.y);
        ctx.lineTo(p1.x,p1.y);
        ctx.stroke();
      }

      // bright core pass (pale gold head → deep gold tail)
      ctx.shadowBlur = 0;
      for(let i=1;i<pts.length;i++){
        const p0 = pts[i-1], p1 = pts[i];
        const k = 1 - (now - p1.t)/LIFE;
        if(k <= 0) continue;
        const ease = k*k;
        const r = Math.round(lerp(197,237,k));
        const g = Math.round(lerp(151,216,k));
        const b = Math.round(lerp(58,154,k));
        ctx.strokeStyle = 'rgba('+r+','+g+','+b+','+ease+')';
        ctx.lineWidth = Math.max(0.4, 3.2*ease);
        ctx.beginPath();
        ctx.moveTo(p0.x,p0.y);
        ctx.lineTo(p1.x,p1.y);
        ctx.stroke();
      }

      // luminous head
      const head = pts[pts.length-1];
      ctx.shadowColor = 'rgba(237,216,154,0.9)';
      ctx.shadowBlur = 16;
      ctx.fillStyle = 'rgba(245,237,214,0.95)';
      ctx.beginPath();
      ctx.arc(head.x, head.y, 2.1, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

</script>

<script>

/* ════════ EMAIL CAPTURE — SECURE VERCEL API ════════ */
(function(){
  const form = document.getElementById('form');
  const email = document.getElementById('email');
  const note = document.getElementById('note');
  const valid = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());

  function setNote(msg, cls){
    note.className = 'note' + (cls ? ' '+cls : '');
    note.textContent = msg;
  }

  function markDone(v){
    form.classList.add('done');
    form.querySelector('button span').textContent = 'Joined';
    email.value = '';
    email.placeholder = 'You are on the list.';
    setNote('Thank you. You are on the list — we will be in touch.', 'success');
  }

  form.addEventListener('submit', async e=>{
    e.preventDefault();

    const v = email.value.trim();

    if(!valid(v)){
      setNote('Please enter a valid email address.', 'error');
      email.focus();
      return;
    }

    const btn = form.querySelector('button span');
    btn.textContent = '...';
    setNote('', '');

    try {
      const res = await fetch('/api/subscribe', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ email: v })
      });

      const data = await res.json().catch(()=>({}));

      if(res.ok){
        markDone(v);
      } else {
        setNote(data.message || 'Something went wrong. Please try again.', 'error');
        btn.textContent = 'Stay Close';
      }
    } catch(err) {
      setNote('Something went wrong. Please try again.', 'error');
      btn.textContent = 'Stay Close';
    }
  });
})();

</script>
